apiVersion: v1
kind: Secret
metadata:
  name: {{ template "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
  managementPortalClientId: {{ .Values.clientId | b64enc | quote }}
  managementPortalClientSecret: {{ .Values.clientSecret | b64enc | quote }}
  {{- if and .Values.jdbc.url (not .Values.jdbc.urlSecret) }}
  databaseUrl: {{ .Values.jdbc.url }}
  {{- end }}
  {{- if and .Values.jdbc.user (not .Values.jdbc.userSecret) }}
  databaseUser: {{ .Values.jdbc.user }}
  {{- end }}
  {{- if and .Values.jdbc.password (not .Values.jdbc.passwordSecret) }}
  databasePassword: {{ .Values.jdbc.password }}
  {{- end }}
