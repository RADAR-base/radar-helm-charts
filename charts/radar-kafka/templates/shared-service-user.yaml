# See for explanation: https://github.com/strimzi/strimzi-kafka-operator/issues/2141
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: shared-service-user
  labels:
    strimzi.io/cluster: {{ index .Values "strimzi-registry-operator" "clusterName" }}
spec:
  authentication:
    # Sets up this user for username/password authentication. This way we do not need to register and manage certificates.
    type: scram-sha-512
  authorization:
    # Official docs on authorizations required for the Schema Registry:
    # https://docs.confluent.io/current/schema-registry/security/index.html#authorizing-access-to-the-schemas-topic
    type: simple
    acls:
      # Allow CRUD operations on all topics for catalog-server.
      - type: allow
        resource:
          type: topic
          name: '*'
          patternType: literal
        operations:
          - Read
          - Write
          - Alter
          - Create
          - Describe
      - type: allow
        resource:
          type: group
          name: '*'
          patternType: literal
        operations:
          - Read
          - Write
          - Alter
          - Create
          - Describe
